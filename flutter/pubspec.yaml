name: meetloop
description: A premium, social connection and interactive hub app for couples and nearby matching.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Routing
  go_router: ^13.0.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI & Styling Accents
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10.1
  hugeicons: ^0.1.0
  lucide_icons_flutter: ^0.354.0

  # Hardware & Core API Skeletons
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.3
  permission_handler: ^11.3.1

  # Network & Serialization
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.3.3
  intl: ^0.19.0

  # Firebase MVP Skeletons
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.8
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^16.3.1+1

  # Local Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
